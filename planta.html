<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planta Externa - WNTV</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container fade-in">
    <div class="header">
        <img src="img/logo.png" alt="Logo WNTV" class="logo-principal">
        <h1>Materiales de Planta Externa</h1>
    </div>

    <div class="form-container">
        <form id="formPlanta" class="form-grid">
            <label for="preformados">Preformados:</label>
            <input type="text" id="preformados" placeholder="Color">

            <label for="splitter">Splitter:</label>
            <input type="text" id="splitter" placeholder="1x8 o 1x16">

            <label for="fibra">Fibra:</label>
            <input type="number" id="fibra" placeholder="Cantidad de hilos">

            <label for="empalmadora">Empalmadora:</label>
            <div class="checkbox-group"><input type="checkbox" id="empalmadora"></div>

            <label for="manguitas">Manguitas:</label>
            <div class="checkbox-group"><input type="checkbox" id="manguitas"></div>

            <label for="cortadora">Cortadora:</label>
            <div class="checkbox-group"><input type="checkbox" id="cortadora"></div>

            <label for="fibraActiva">Fibra Activa:</label>
            <div class="checkbox-group"><input type="checkbox" id="fibraActiva"></div>

            <button type="submit" class="btn-guardar">💾 Guardar Registro</button>
        </form>
    </div>

    <div class="action-buttons">
        <button onclick="exportarExcel()" class="btn-excel">📤 Exportar a Excel</button>
        <button onclick="volver()" class="btn-back">⬅ Volver</button>
    </div>

    <div class="history-container">
        <h2>📋 Historial de Planta Externa</h2>
        <div id="historial"></div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
