<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planta Externa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container fade-in">
    <h1>🌐 Materiales de Planta Externa</h1>

    <form id="formPlanta">

        <input type="text" id="preformados" placeholder="Preformados (color)">
        <input type="text" id="splitter" placeholder="Splitter (1x8 o 1x16)">
        <input type="number" id="fibra" placeholder="Fibra (hilos)">

        <label><input type="checkbox" id="empalmadora"> Empalmadora</label>
        <label><input type="checkbox" id="manguitas"> Manguitas</label>
        <label><input type="checkbox" id="cortadora"> Cortadora</label>
        <label><input type="checkbox" id="fibraActiva"> Fibra Activa</label>

        <button type="submit">💾 Guardar</button>
    </form>

    <h2>📋 Historial</h2>
    <div id="historial"></div>

    <br>
    <button onclick="volver()">⬅ Volver</button>
</div>

<script src="script.js"></script>
</body>
</html>
