<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planta Externa</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container fade-in">

    <div class="title-logo">
        <h1>🌐 Materiales de Planta Externa</h1>
    </div>

    <form id="formPlanta" class="form-grid">
        <label for="preformados">Preformados:</label>
        <input type="text" id="preformados" placeholder="Color">

        <label for="splitter">Splitter:</label>
        <input type="text" id="splitter" placeholder="1x8 o 1x16">

        <label for="fibra">Fibra:</label>
        <input type="number" id="fibra" placeholder="Cantidad de hilos">

        <label for="empalmadora">Empalmadora:</label>
        <input type="checkbox" id="empalmadora">

        <label for="manguitas">Manguitas:</label>
        <input type="checkbox" id="manguitas">

        <label for="cortadora">Cortadora:</label>
        <input type="checkbox" id="cortadora">

        <label for="fibraActiva">Fibra Activa:</label>
        <input type="checkbox" id="fibraActiva">

        <div class="form-footer">
            <button type="submit" class="btn-primary">💾 Guardar Registro</button>
        </div>
    </form>

    <div class="action-buttons">
        <button onclick="exportExcel()" class="btn-excel">📤 Exportar a Excel</button>
        <button onclick="volver()" class="btn-back">⬅ Volver</button>
    </div>

    <div class="history-section">
        <h2>📋 Historial de Planta Externa</h2>
        <div id="historial" class="table-container">
            </div>
    </div>

</div>

<script src="js/xlsx.full.min.js"></script>
<script src="js/script.js"></script>
</body>
</html>
