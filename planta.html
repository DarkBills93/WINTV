<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Planta Externa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container fade-in">
    <h1>🌐 Materiales de Planta Externa</h1>

    <form id="formPlanta">

        <label>Preformados (Color):</label>
        <input type="text" id="preformados" placeholder="Ej: Rojo">

        <label>Splitter:</label>
        <input type="text" id="splitter" placeholder="1x8 o 1x16">

        <label>Fibra (Cantidad de hilos):</label>
        <input type="number" id="fibra" placeholder="Ej: 12">

        <label><input type="checkbox" id="empalmadora"> Empalmadora</label>
        <label><input type="checkbox" id="manguitas"> Manguitas</label>
        <label><input type="checkbox" id="cortadora"> Cortadora</label>
        <label><input type="checkbox" id="fibraActiva"> Fibra Activa</label>

        <button type="submit">Guardar</button>
    </form>

    <div id="resultado"></div>

    <br>
    <button onclick="volver()">⬅ Volver</button>
</div>

<script src="script.js"></script>
</body>
</html>
